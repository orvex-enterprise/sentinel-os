services:
  sentinel-postgres:
    image: pgvector/pgvector:pg16
    container_name: sentinel-postgres
    restart: always
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_secret}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

  sentinel-redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  sentinel-api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    container_name: sentinel-api-gateway
    restart: always
    environment:
      PORT: 4000
      DATABASE_URL: postgres://sentinel:sentinel_secret@sentinel-postgres:5432/sentinel_db
      REDIS_URL: redis://:redis_secret@sentinel-redis:6379
      API_TOKEN_LIVE: tok_live_demo_8849201948210
    ports:
      - "4000:4000"
    depends_on:
      sentinel-postgres:
        condition: service_healthy
      sentinel-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentinel-orchestration:
    build:
      context: ..
      dockerfile: services/orchestration/Dockerfile
    container_name: sentinel-orchestration
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgres://sentinel:sentinel_secret@sentinel-postgres:5432/sentinel_db
      REDIS_URL: redis://:redis_secret@sentinel-redis:6379
      GATEWAY_URL: http://sentinel-api-gateway:4000
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "5000:5000"
    depends_on:
      sentinel-postgres:
        condition: service_healthy
      sentinel-redis:
        condition: service_healthy
      sentinel-api-gateway:
        condition: service_healthy

  sentinel-dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    container_name: sentinel-dashboard
    restart: always
    ports:
      - "3000:80"
    depends_on:
      sentinel-api-gateway:
        condition: service_healthy

  sentinel-simulator:
    build:
      context: ..
      dockerfile: ai/simulator/Dockerfile
    container_name: sentinel-simulator
    restart: always
    environment:
      REDIS_URL: redis://:redis_secret@sentinel-redis:6379
      GATEWAY_URL: http://sentinel-api-gateway:4000
    depends_on:
      sentinel-api-gateway:
        condition: service_healthy
      sentinel-orchestration:
        condition: service_started

volumes:
  pg_data:
  redis_data:
