<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8A2BE2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bg-grad)" stroke="#334155" stroke-width="2" />

  <!-- Grid Pattern Overlay -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" />
    <line x1="800" y1="0" x2="800" y2="300" />
    <line x1="1000" y1="0" x2="1000" y2="300" />
  </g>

  <!-- Shield Logo Icon -->
  <g transform="translate(80, 65)">
    <path d="M80 0 L150 30 V90 C150 150 80 180 80 180 C80 180 10 150 10 90 V30 Z" fill="url(#accent-grad)" opacity="0.15" filter="url(#glow)" />
    <path d="M80 10 L140 35 V85 C140 135 80 165 80 165 C80 165 20 135 20 85 V35 Z" fill="none" stroke="url(#accent-grad)" stroke-width="4" />
    <circle cx="80" cy="80" r="25" fill="none" stroke="#00F0FF" stroke-width="3" stroke-dasharray="6 6" />
    <circle cx="80" cy="80" r="10" fill="#00F0FF" filter="url(#glow)" />
    <line x1="80" y1="30" x2="80" y2="55" stroke="#00F0FF" stroke-width="2" />
    <line x1="80" y1="105" x2="80" y2="130" stroke="#00F0FF" stroke-width="2" />
    <line x1="30" y1="80" x2="55" y2="80" stroke="#00F0FF" stroke-width="2" />
    <line x1="105" y1="80" x2="130" y2="80" stroke="#00F0FF" stroke-width="2" />
  </g>

  <!-- Title & Typography -->
  <text x="280" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="2">
    SENTINEL <tspan fill="url(#accent-grad)">OS</tspan>
  </text>
  
  <text x="280" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#94A3B8" letter-spacing="1">
    AUTONOMOUS MISSION CONTROL FOR SUPPLY CHAIN RESILIENCE
  </text>

  <!-- Tech Stack Badges inside SVG -->
  <g transform="translate(280, 200)">
    <!-- Badge 1: LangGraph -->
    <rect x="0" y="0" width="140" height="36" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="20" cy="18" r="5" fill="#10B981" />
    <text x="35" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">LangGraph AI</text>

    <!-- Badge 2: MCP Tooling -->
    <rect x="155" y="0" width="150" height="36" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="175" cy="18" r="5" fill="#8A2BE2" />
    <text x="190" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">MCP Tooling</text>

    <!-- Badge 3: pgvector -->
    <rect x="320" y="0" width="140" height="36" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="340" cy="18" r="5" fill="#3B82F6" />
    <text x="355" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">pgvector DB</text>

    <!-- Badge 4: Zero-Cost Ollama -->
    <rect x="475" y="0" width="160" height="36" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="495" cy="18" r="5" fill="#00F0FF" />
    <text x="510" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">Local-First Ollama</text>
  </g>
</svg>
