<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      .box { fill: #111827; stroke: #334155; stroke-width: 2px; rx: 8px; }
      .box-active { fill: #1E293B; stroke: #3B82F6; stroke-width: 2.5px; rx: 8px; }
      .box-alert { fill: #1E293B; stroke: #EF4444; stroke-width: 2.5px; rx: 8px; }
      .box-success { fill: #1E293B; stroke: #10B981; stroke-width: 2.5px; rx: 8px; }
      .text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; }
      .text-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #94A3B8; text-anchor: middle; }
      .line { stroke: #64748B; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
      .line-active { stroke: #00F0FF; stroke-width: 2.5px; fill: none; marker-end: url(#arrow-cyan); stroke-dasharray: 6 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00F0FF" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" rx="12" fill="#0B0F19" stroke="#1E293B" stroke-width="2" />

  <!-- Header Title -->
  <text x="500" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
    SENTINEL OS — AUTONOMOUS LANGGRAPH STATE MACHINE
  </text>

  <!-- Node 1: WMS Event Ingestion -->
  <rect class="box" x="50" y="210" width="160" height="80" />
  <text class="text-title" x="130" y="245">📡 WMS Telemetry</text>
  <text class="text-sub" x="130" y="265">Redis Stream / HTTP</text>

  <!-- Arrow 1 -->
  <path class="line-active" d="M 210 250 L 270 250" />

  <!-- Node 2: Monitor & Detect Agent -->
  <rect class="box-alert" x="270" y="210" width="170" height="80" />
  <text class="text-title" x="355" y="245" fill="#EF4444">🔍 Detect Agent</text>
  <text class="text-sub" x="355" y="265">Z-Score > 3.0 Anomaly</text>

  <!-- Arrow 2 -->
  <path class="line-active" d="M 440 250 L 500 250" />

  <!-- Node 3: Investigate Agent -->
  <rect class="box-active" x="500" y="210" width="180" height="80" />
  <text class="text-title" x="590" y="245">🕵️ Investigate Agent</text>
  <text class="text-sub" x="590" y="265">MCP Tool & EDI Queries</text>

  <!-- Arrow to pgvector -->
  <path class="line" d="M 590 210 L 590 130" />
  <rect class="box" x="500" y="50" width="180" height="80" />
  <text class="text-title" x="590" y="85" fill="#3B82F6">🐘 pgvector DB</text>
  <text class="text-sub" x="590" y="105">Cosine Similarity RCA</text>

  <!-- Arrow 3 -->
  <path class="line-active" d="M 680 250 L 740 250" />

  <!-- Node 4: Plan & Risk Agent -->
  <rect class="box-active" x="740" y="210" width="180" height="80" />
  <text class="text-title" x="830" y="245">📊 Plan Agent</text>
  <text class="text-sub" x="830" y="265">Risk Scored JSON Plan</text>

  <!-- Arrow down to UI Approval Gate -->
  <path class="line-active" d="M 830 290 L 830 360" />

  <!-- Node 5: Human UI Approval Gate -->
  <rect class="box-success" x="650" y="360" width="360" height="90" />
  <text class="text-title" x="830" y="395" fill="#10B981">✋ NON-BYPASSABLE HUMAN APPROVAL GATE</text>
  <text class="text-sub" x="830" y="415">Operator verifies Risk Score (12%) and clicks Approve in UI</text>
  <text class="text-sub" x="830" y="435">Cryptographic token emitted to Execute Agent</text>

  <!-- Arrow back to Execute -->
  <path class="line-active" d="M 650 405 L 440 405" />

  <!-- Node 6: Execute Agent -->
  <rect class="box-active" x="260" y="365" width="180" height="80" />
  <text class="text-title" x="350" y="400">⚙️ Execute Agent</text>
  <text class="text-sub" x="350" y="420">business_system_write()</text>

  <!-- Arrow to Record -->
  <path class="line" d="M 260 405 L 200 405" />

  <!-- Node 7: Record & Improve -->
  <rect class="box" x="30" y="365" width="170" height="80" />
  <text class="text-title" x="115" y="400" fill="#10B981">📈 Record Agent</text>
  <text class="text-sub" x="115" y="420">Index Case in pgvector</text>

  <!-- Loop arrow back up -->
  <path class="line" d="M 115 365 L 115 290" />
</svg>
